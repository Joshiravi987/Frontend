<!DOCTYPE html>
<html>
<head>

<title>Hotel Registration</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

</head>

<body class="container mt-4">

<h2>Hotel Guest Registration</h2>

<form id="guestForm">

<div class="row">

<div class="col-md-6 mb-3">
<label class="form-label">Full Name</label>
<input type="text" class="form-control" id="name">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Phone Number</label>
<input type="number" class="form-control" id="phone">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Email Address</label>
<input type="email" class="form-control" id="email">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Aadhar Card Number</label>
<input type="number" class="form-control" id="aadhar">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Check In Date</label>
<input type="date" class="form-control" id="checkin">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Check Out Date</label>
<input type="date" class="form-control" id="checkout">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Number of Adults</label>
<input type="number" class="form-control" id="adults">
</div>

<div class="col-md-12 mb-3">
<label class="form-label">Address</label>
<textarea class="form-control" id="address"></textarea>
</div>

<div class="col-md-12 mb-3">
<label class="form-label">Purpose of Visit</label>
<textarea class="form-control" id="purpose"></textarea>
</div>

<div class="col-md-12">
<button type="submit" class="btn btn-primary">Submit</button>
</div>

</div>

</form>

<div id="message"></div>

<script type="module" src="js/formHandler.js"></script>

</body>
</html>
